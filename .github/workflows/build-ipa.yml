name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete Flutter project (generate ios/ scaffold)
        run: flutter create --platforms=ios --project-name music_player --org com.example .

      - name: Patch Info.plist (file sharing + background audio + display name)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string 'Apple Music と iTunes ライブラリの曲を再生するために使用します'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Music Player'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Music Player'" "$PLIST"

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build iOS (no codesign)
        # Runner.xcodeprojの署名パッチは削除。--no-codesignだけで
        # 十分（Flutter内部でxcodebuildにCODE_SIGNING_ALLOWED=NOを渡す）。
        # Flutterの最終署名チェックで警告になっても、その時点で
        # xcodebuildは完了しているのでRunner.appは正しく生成される。
        continue-on-error: true
        id: flutter_build
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee /tmp/flutter_build.log

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Last 100 lines of flutter build log ==="
          tail -100 /tmp/flutter_build.log || true

      - name: Locate and verify Runner.app
        id: locate
        run: |
          echo "=== Runner.app candidates ==="
          find build -name "Runner.app" -type d 2>/dev/null || true
          echo ""

          # 優先順にRunner.appを探す
          APP=""
          for candidate in \
            "build/ios/iphoneos/Runner.app" \
            "build/ios/Release-iphoneos/Runner.app"; do
            if [ -d "$candidate" ]; then
              APP="$candidate"
              break
            fi
          done
          # フォールバック: findで最初に見つかったもの
          if [ -z "$APP" ]; then
            APP=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::Runner.app が見つかりません"
            exit 1
          fi

          echo "=== Using: $APP ==="
          echo "Total size: $(du -sh "$APP" | cut -f1)"
          echo ""
          echo "=== Contents (top level) ==="
          ls -la "$APP"
          echo ""

          # Runner バイナリの存在確認
          if [ ! -f "$APP/Runner" ]; then
            echo "::error::Runner バイナリが見つかりません（$APP/Runner）"
            echo "ビルドが Compile Sources / Link Binary フェーズを完了していません。"
            exit 1
          fi
          echo "=== Runner binary ==="
          file "$APP/Runner"
          ls -lh "$APP/Runner"
          echo ""

          # Frameworks フォルダの存在確認
          if [ ! -d "$APP/Frameworks" ]; then
            echo "::error::Frameworks/ が見つかりません（$APP/Frameworks）"
            echo "Embed Frameworks フェーズが完了していません。"
            exit 1
          fi
          echo "=== Frameworks ==="
          ls -la "$APP/Frameworks/"

          echo "app_path=$APP" >> "$GITHUB_OUTPUT"

      - name: Package IPA (dummy folder trick)
        run: |
          mkdir -p dummy Payload
          cp -R "${{ steps.locate.outputs.app_path }}" Payload/
          zip -r dummy/music_player.ipa Payload
          rm -rf Payload
          echo "=== IPA info ==="
          ls -lh dummy/music_player.ipa
          echo "Uncompressed size:"
          unzip -l dummy/music_player.ipa | tail -1

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: music-player-ipa
          path: dummy/

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: /tmp/flutter_build.log
