name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete Flutter project (generate ios/ scaffold)
        run: flutter create --platforms=ios --project-name music_player --org com.example .

      - name: Apply iOS customizations (File Provider Extension)
        run: |
          mkdir -p ios/MusicPlayerFileProvider
          cp ios_addons/FileProvider/FileProviderExtension.swift ios/MusicPlayerFileProvider/
          cp ios_addons/FileProvider/FileProviderItem.swift ios/MusicPlayerFileProvider/
          cp ios_addons/FileProvider/FileProviderEnumerator.swift ios/MusicPlayerFileProvider/
          cp ios_addons/FileProvider/Info.plist ios/MusicPlayerFileProvider/
          echo "=== Extension files ==="
          ls -la ios/MusicPlayerFileProvider/

          cp ios_addons/AppDelegate.swift ios/Runner/AppDelegate.swift

          # Phase 2a: App Group entitlements for both Runner and Extension
          cp ios_addons/entitlements/Runner.entitlements ios/Runner/Runner.entitlements
          cp ios_addons/entitlements/MusicPlayerFileProvider.entitlements ios/MusicPlayerFileProvider/MusicPlayerFileProvider.entitlements
          echo "=== Entitlements files ==="
          ls -la ios/Runner/Runner.entitlements ios/MusicPlayerFileProvider/MusicPlayerFileProvider.entitlements
          echo "--- Runner.entitlements contents ---"
          cat ios/Runner/Runner.entitlements

          if grep -q "^# platform :ios" ios/Podfile; then
            sed -i.bak "s/^# platform :ios.*/platform :ios, '16.0'/" ios/Podfile
          elif grep -q "^platform :ios" ios/Podfile; then
            sed -i.bak "s/^platform :ios,.*/platform :ios, '16.0'/" ios/Podfile
          else
            echo "platform :ios, '16.0'" | cat - ios/Podfile > /tmp/podfile.new && mv /tmp/podfile.new ios/Podfile
          fi
          echo "=== Podfile platform line ==="
          grep 'platform :ios' ios/Podfile

          ruby ios_addons/patch_xcodeproj.rb

      - name: Patch Info.plist (main app)
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string 'Apple Music と iTunes ライブラリの曲を再生するために使用します'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'Music Player'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'Music Player'" "$PLIST"

      - name: Diagnostic - Xcode project targets
        # v14 追加: パッチ後のプロジェクト状態を確認
        run: |
          echo "=== Targets in Runner.xcodeproj ==="
          ruby -e "require 'xcodeproj'; p = Xcodeproj::Project.open('ios/Runner.xcodeproj'); p.targets.each { |t| puts '  - ' + t.name + ' [' + t.product_type.to_s + ']' }"
          echo ""
          echo "=== ios/MusicPlayerFileProvider/ contents ==="
          ls -la ios/MusicPlayerFileProvider/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build iOS (no codesign)
        # v14 変更: continue-on-error は残すが、ログを完全に取れるように
        continue-on-error: true
        id: flutter_build
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee /tmp/flutter_build.log
          echo "flutter build ios exit code: ${PIPESTATUS[0]}"

      - name: Show FULL build log
        # v14 変更: tail ではなく全文を表示（xcodebuildエラーが中盤に出る可能性）
        if: always()
        run: |
          echo "=== FULL flutter build log ==="
          if [ -f /tmp/flutter_build.log ]; then
            wc -l /tmp/flutter_build.log
            cat /tmp/flutter_build.log
          else
            echo "flutter_build.log が存在しません"
          fi

      - name: Diagnostic - build/ directory state
        # v14 追加: ビルド結果のディレクトリ構造を詳細に出力
        if: always()
        run: |
          echo "=== build/ directory tree (up to depth 5) ==="
          find build -maxdepth 5 -type d 2>/dev/null | sort || true
          echo ""
          echo "=== Any Runner.app anywhere? ==="
          find build -name "Runner.app" -type d 2>/dev/null || echo "見つかりません"
          echo ""
          echo "=== Any .appex anywhere? ==="
          find build -name "*.appex" -type d 2>/dev/null || echo "見つかりません"

      - name: Locate and verify Runner.app
        id: locate
        run: |
          APP=""
          for candidate in \
            "build/ios/iphoneos/Runner.app" \
            "build/ios/Release-iphoneos/Runner.app"; do
            if [ -d "$candidate" ]; then
              APP="$candidate"
              break
            fi
          done
          if [ -z "$APP" ]; then
            APP=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::Runner.app が見つかりません"
            exit 1
          fi

          echo "=== Runner.app: $APP ==="
          du -sh "$APP"
          if [ -f "$APP/Runner" ]; then
            file "$APP/Runner"
          else
            echo "::error::Runner バイナリが欠損しています"
            exit 1
          fi
          if [ -d "$APP/PlugIns/MusicPlayerFileProvider.appex" ]; then
            echo "✓ File Provider Extension が埋め込まれています"
          else
            echo "::warning::MusicPlayerFileProvider.appex が埋め込まれていません"
          fi
          echo "app_path=$APP" >> "$GITHUB_OUTPUT"

      - name: Package IPA
        run: |
          mkdir -p dummy Payload
          cp -R "${{ steps.locate.outputs.app_path }}" Payload/
          zip -r dummy/music_player.ipa Payload
          rm -rf Payload
          ls -lh dummy/music_player.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: music-player-ipa
          path: dummy/

      - name: Upload diagnostic artifacts (always)
        # v14 追加: 成功・失敗にかかわらず診断情報をアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-info
          path: |
            /tmp/flutter_build.log
            ios/Runner.xcodeproj/project.pbxproj
            ios/Podfile
            ios/Runner/Info.plist
